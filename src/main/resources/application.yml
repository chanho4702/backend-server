server:
  port: 9100
spring:
  application:
    name: board-service
  # 모든 자격증명/URL은 env로 오버라이드 가능. 기본값은 로컬 dev 전용 — 운영에서는 반드시 주입.
  datasource:
    url: ${BOARD_DB_URL:jdbc:postgresql://localhost:5433/boarddb}
    username: ${BOARD_DB_USERNAME:keycloak}
    password: ${BOARD_DB_PASSWORD:keycloak}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${AUTH_JWKS_URI:http://localhost:9000/.well-known/jwks.json}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
  instance:
    # Windows/사설망에서 DESKTOP-xxx.mshome.net 같은 DNS 해석 불가 호스트명으로 등록되면
    # 게이트웨이의 lb:// 해석이 UnknownHostException으로 죽는다 — IP로 등록 (E2E에서 실측).
    prefer-ip-address: true

platform:
  jwt:
    # auth-server가 발급하는 자체 AT의 issuer/audience — 서명 외 추가 검증에 사용.
    issuer: ${PLATFORM_ISSUER:http://localhost:9000}
    audience: ${PLATFORM_AUDIENCE:platform-api}
